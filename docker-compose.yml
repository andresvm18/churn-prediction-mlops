services:
  # API Service 
  api:
    build:
      context: .                           # Build context - current directory
      dockerfile: Dockerfile.api           # Dockerfile for the API service
    container_name: churn-api              # Container name for easy reference
    ports:
      - "8000:8000"                        # Host port 8000 -> Container port 8000
    restart: unless-stopped                # Auto-restart unless manually stopped
    volumes:
      - predictions_data:/app/data/predictions  # Persistent volume for SQLite database
    environment:
      - DB_PATH=/app/data/predictions/predictions.db  # Database file path
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]  # Health check endpoint
      interval: 30s                         # Check every 30 seconds
      timeout: 10s                          # Timeout after 10 seconds
      retries: 3                            # Retry 3 times before marking unhealthy
      start_period: 15s                     # Wait 15 seconds before first check

  # Dashboard Service
  dashboard:
    build:
      context: .                           # Build context - current directory
      dockerfile: Dockerfile.streamlit     # Dockerfile for the Streamlit dashboard
    container_name: churn-dashboard        # Container name for easy reference
    ports:
      - "8501:8501"                        # Host port 8501 -> Container port 8501
    restart: unless-stopped                # Auto-restart unless manually stopped
    depends_on:
      api:
        condition: service_healthy         # Wait for API health check to pass
    environment:
      - API_URL=http://api:8000

# Volumes
volumes:
  predictions_data:                         # Persistent volume for prediction database